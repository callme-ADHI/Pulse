name: pulse
description: "Pulse by AEVORAX — the instrument panel for people running more than one real project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.26.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Graph rendering
  flutter_graph_view: ^2.1.0

  # YAML parsing
  yaml: ^3.1.3

  # Background jobs
  workmanager: ^0.9.0

  # Notifications
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

  # Charts
  fl_chart: ^0.69.2

  # Home widget
  home_widget: ^0.7.0

  # Sharing
  share_plus: ^11.0.0

  # IDs
  uuid: ^4.5.1

  # File operations
  file_picker: ^8.3.7

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  collection: ^1.19.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
